<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stagr — Player: Waiting</title>
  <link rel="stylesheet" href="shared.css">
</head>
<body class="phone-screen">
  <nav class="screen-nav">
    <a class="home" href="index.html">↩ All screens</a>
    <span class="screen-name">Player — Waiting</span>
    <div class="flow-links">
      <a class="back" href="player-main.html">← Main</a>
    </div>
  </nav>

  <div class="phone">
    <div class="status-bar">
      <span>9:41</span>
      <span>Stagr · Day 4</span>
      <span>●●●●</span>
    </div>
    <div class="content" style="
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      min-height: calc(100vh - 120px);
      text-align: center; padding: 32px 28px;
      gap: 28px;
    ">

      <!-- Roll result -->
      <div style="
        width: 80px; height: 80px; border-radius: 50%;
        background: #d3f9d8; border: 3px solid #69db7c;
        display: flex; align-items: center; justify-content: center;
        font-size: 36px; font-weight: 800; color: #2b8a3e;
      ">11</div>

      <!-- Mood flavour text -->
      <div class="mood-circle happy" style="width: 56px; height: 56px; font-size: 28px;">😊</div>

      <p style="font-size: 18px; line-height: 1.65; color: #495057; font-style: italic; max-width: 300px;">
        "Feeling sharp today — the pieces are finally coming together."
      </p>

      <!-- Prompt -->
      <p style="
        font-size: 13px; color: #adb5bd;
        text-transform: uppercase; letter-spacing: 0.8px;
        border-top: 1px solid var(--border); width: 100%; padding-top: 20px; margin-top: 8px;
      ">
        Look at the shared screen ↑
      </p>

    </div>
  </div>
</body>
</html>
